<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <style>
      .lime{fill:#E8F12C}
      .ink{fill:#0b0b0b}
      .lime-fg{fill:#E8F12C}
      .body{font-family:'JetBrains Mono','Menlo',monospace;font-weight:600}
      .display{font-family:'Silkscreen','Courier New',monospace;font-weight:700}
    </style>
  </defs>
  <rect class="lime" width="1200" height="630"/>
  <!-- top black bar -->
  <rect class="ink" x="0" y="0" width="1200" height="60"/>
  <text x="32" y="40" class="body" font-size="22" fill="#fff">BlackBar</text>
  <circle cx="1040" cy="30" r="6" fill="#34d058"/>
  <text x="1056" y="38" class="body" font-size="22" fill="#E8F12C">4</text>
  <text x="1100" y="38" class="body" font-size="22" fill="#fff">12:05</text>
  <!-- big BLACKBAR -->
  <text x="60" y="340" class="display" font-size="220" fill="#0b0b0b">BLACKBAR</text>
  <!-- disclaimer pill -->
  <rect x="60" y="400" rx="8" ry="8" width="660" height="44" class="ink"/>
  <circle cx="86" cy="422" r="6" class="lime-fg"/>
  <text x="106" y="430" class="body" font-size="20" fill="#E8F12C">INDEPENDENT TOOL · NOT AFFILIATED WITH BLACKSMITH</text>
  <!-- tagline -->
  <text x="60" y="500" class="body" font-size="36" fill="#0b0b0b">Your Blacksmith CI status, in your menu bar.</text>
  <text x="60" y="558" class="body" font-size="22" fill="#0b0b0b" opacity="0.7">macOS · Apple Silicon · Intel · MIT</text>
  <text x="60" y="596" class="body" font-size="22" fill="#0b0b0b" opacity="0.7">black.bar</text>
</svg>
